services:
  backend:
    build: ./blog_backend
    container_name: blog-backend
    restart: always
    ports:
      - "8001:8000"
    environment:
      DB_HOST: "192.168.1.8"
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: "020110"
      DB_NAME: myapp
      QDRANT_URL: "http://192.168.1.8:6333"
      QDRANT_COLLECTION: MyBlog
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-deepseek-chat}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      AGENT_ROOT: ${AGENT_ROOT:-./data}

  frontend:
    build: ./blog_frontend
    container_name: blog-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
